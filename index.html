<style>
/* ══ Google Font ══ */
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap');

:root{
  --blue:#1c4587;--blue-mid:#2d5fa8;--blue-lt:#c9daf8;--blue-bg:#e8f0fe;
  --green:#1e8e3e;--green-lt:#d4edda;--red:#c5221f;--red-lt:#fce8e6;
  --orange:#e37400;--orange-lt:#fff3cd;--teal:#007b83;--purple:#7b1fa2;
  --bg:#f0f4ff;--white:#fff;--gray:#5f6368;--gray-lt:#f1f3f4;
  --border:#e0e0e0;--dark:#202124;--shadow:0 2px 12px rgba(28,69,135,.10);
  --font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:var(--font)}
body{background:var(--bg);min-height:100vh;font-size:14px;color:var(--dark)}

/* ══ LOGIN ══ */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0d2b6b 0%,#1c4587 50%,#2d5fa8 100%);position:relative;overflow:hidden}
.login-screen::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.login-box{background:white;border-radius:20px;padding:44px 40px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.35);position:relative;z-index:1}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo .logo-badge{display:inline-flex;align-items:center;justify-content:center;width:70px;height:70px;background:var(--blue-bg);border-radius:50%;margin-bottom:14px}
.login-logo h1{font-size:26px;font-weight:800;color:var(--blue);letter-spacing:-.5px}
.login-logo p{color:var(--gray);font-size:13px;margin-top:4px}
.login-btn{width:100%;padding:13px;background:var(--blue);color:white;border:none;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:background .18s,transform .1s}
.login-btn:hover{background:#174ea6}.login-btn:active{transform:scale(.98)}.login-btn:disabled{background:#9aa0a6;cursor:not-allowed;transform:none}
.login-err{background:var(--red-lt);color:var(--red);padding:10px 14px;border-radius:8px;font-size:13px;margin-top:14px;display:none; text-align:center}
.inp-wrap{margin-bottom:16px}
.inp-wrap label{display:block;font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.inp-wrap input,.inp-wrap select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;outline:none;transition:border-color .18s,box-shadow .18s;background:#fafafa;color:var(--dark)}
.inp-wrap input:focus,.inp-wrap select:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-lt);background:#fff}
.pwd-wrap{position:relative;display:block}
.pwd-wrap input{width:100%;padding:11px 44px 11px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;outline:none;background:#fafafa;color:var(--dark);box-sizing:border-box;transition:border-color .18s,box-shadow .18s}
.pwd-wrap input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-lt);background:#fff}
.eye-btn{position:absolute;right:0;top:0;bottom:0;width:42px;background:transparent;border:none;border-radius:0 9px 9px 0;cursor:pointer;color:var(--gray);display:flex;align-items:center;justify-content:center;transition:color .15s;padding:0}
.eye-btn:hover{color:var(--blue)}

/* ══ DASH LAYOUT ══ */
.dash{display:flex;min-height:100vh}
.sidebar{width:230px;min-height:100vh;background:var(--blue);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:200;transition:transform .28s cubic-bezier(.4,0,.2,1)}
.sb-logo{padding:22px 18px 18px;border-bottom:1px solid rgba(255,255,255,.12)}
.sb-logo .logo-row{display:flex;align-items:center;gap:11px}
.sb-logo .logo-icon{width:38px;height:38px;background:rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center}
.sb-logo h2{color:white;font-size:18px;font-weight:800}
.sb-logo span{color:rgba(255,255,255,.55);font-size:11px;display:block;margin-top:3px}
.sb-nav{flex:1;padding:10px 0;overflow-y:auto}
.nav-section{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.35);padding:14px 18px 6px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 18px;color:rgba(255,255,255,.7);cursor:pointer;font-size:14px;font-weight:500;border-left:3px solid transparent;transition:all .15s;user-select:none}
.nav-item:hover{background:rgba(255,255,255,.08);color:white}
.nav-item.active{background:rgba(255,255,255,.14);color:white;border-left-color:white;font-weight:700}
.sb-footer{padding:14px 18px;border-top:1px solid rgba(255,255,255,.12)}
.sb-user{margin-bottom:10px}
.sb-user .su-name{color:white;font-weight:700;font-size:14px;margin-bottom:4px}
.sb-user .su-email{color:rgba(255,255,255,.5);font-size:11px;margin-bottom:4px}
.sb-user .su-shift{color:rgba(255,255,255,.7);font-size:11px;margin-bottom:6px;font-style:italic}
.role-badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.rb-admin{background:#fbbc04;color:#000}.rb-sm{background:#e53935;color:#fff}.rb-svv{background:#8e24aa;color:#fff}
.rb-sv{background:#34a853;color:#fff}.rb-qtc{background:#00bcd4;color:#fff}.rb-wla{background:#43a047;color:#fff}
.logout-btn{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:rgba(255,255,255,.75);font-size:13px;cursor:pointer;width:100%;transition:all .15s}
.logout-btn:hover{background:rgba(255,255,255,.16);color:white}
.main{margin-left:230px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:white;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.tb-left .tb-title{font-size:20px;font-weight:800;color:var(--blue)}
.tb-left .tb-sub{font-size:12px;color:var(--gray);margin-top:2px}
.content{padding:24px 28px;flex:1}

/* ══ COMPONENTS ══ */
.filter-bar{background:white;border:1px solid var(--border);border-radius:12px;padding:12px 18px;display:flex;align-items:center;gap:12px;margin-bottom:22px;flex-wrap:wrap;box-shadow:var(--shadow)}
.filter-bar label{font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase}
.fbtn{padding:8px 18px;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.fbtn-primary{background:var(--blue);color:white}.fbtn-primary:hover{background:#174ea6}
.fbtn-ghost{background:var(--gray-lt);color:var(--gray)}.fbtn-ghost:hover{background:#e0e0e0}
.fb-time{padding:7px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;outline:none;color:var(--dark);background:#fff;cursor:pointer;min-width:120px}
.fb-time:focus{border-color:var(--blue)}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.card{background:white;border-radius:14px;padding:20px 18px;border:1px solid var(--border);position:relative;overflow:hidden;box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(28,69,135,.14)}
.card.card-active{box-shadow:0 0 0 3px var(--blue),0 6px 20px rgba(28,69,135,.18)!important;transform:translateY(-3px)!important}
.card-stripe{position:absolute;top:0;left:0;right:0;height:4px;border-radius:14px 14px 0 0}
.cs-blue{background:var(--blue)}.cs-green{background:var(--green)}.cs-orange{background:var(--orange)}.cs-teal{background:var(--teal)}.cs-purple{background:var(--purple)}.cs-red{background:var(--red)}
.card-lbl{font-size:11px;color:var(--gray);font-weight:700;text-transform:uppercase;letter-spacing:.5px;text-align:center;width:100%}
.card-val{font-size:38px;font-weight:800;color:var(--dark);margin:8px 0 0;line-height:1;text-align:center;width:100%}
.sec-hdr{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:700;color:var(--blue);margin-bottom:12px}
.sec-hdr::after{content:'';flex:1;height:1.5px;background:var(--blue-lt);border-radius:2px}
.tbl-card{background:white;border-radius:12px;border:1px solid var(--border);overflow:hidden;margin-bottom:20px;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--blue)}
th{color:white;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:11px 14px;text-align:center;white-space:nowrap}
th.left{text-align:left}
td{padding:9px 14px;font-size:13px;text-align:center;border-bottom:1px solid #f5f5f5;color:var(--dark)}
td.left{text-align:left}td.bold{font-weight:700}
tbody tr:nth-child(even) td{background:#f8f9ff}
tbody tr:hover td{background:var(--blue-bg)}
tr.total-row td{background:var(--blue)!important;color:white!important;font-weight:700}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--gray);font-size:14px;gap:12px}
.spin{width:22px;height:22px;border:3px solid var(--blue-lt);border-top-color:var(--blue);border-radius:50%;animation:spin .75s linear infinite;flex-shrink:0}
.toast{position:fixed;bottom:24px;right:24px;z-index:9999;padding:13px 20px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.25);transform:translateY(80px);opacity:0;transition:transform .3s ease,opacity .3s ease;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}.toast.ok{background:#1e8e3e;color:white}.toast.err{background:var(--red);color:white}
.dp-wrap{position:relative;display:inline-flex;align-items:center;min-width:130px}
.dp-input{width:100%;padding:7px 32px 7px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;outline:none;background:#fff;color:var(--dark);cursor:pointer;transition:border-color .15s,box-shadow .15s;white-space:nowrap}
.dp-popup{position:absolute;top:calc(100% + 6px);left:0;z-index:9000;background:white;border:1.5px solid var(--blue-lt);border-radius:12px;box-shadow:0 8px 32px rgba(28,69,135,.18);padding:14px;width:270px;animation:fadeUp .15s ease}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ══════ DARK MODE ══════ */
body.dark{--bg:#0f1117;--white:#1e2130;--dark:#e8eaf0;--gray:#9aa0b4;--gray-lt:#252840;--border:#2d3250;--blue-bg:#1a2040;--blue-lt:#1e3060;--shadow:0 2px 12px rgba(0,0,0,.4)}
body.dark .sidebar{background:#0d1420}
body.dark .topbar,body.dark .filter-bar,body.dark .card,body.dark .tbl-card,body.dark .pagination{background:#1e2130;border-color:#2d3250}
body.dark .content,body.dark .main{background:#0f1117}
body.dark td{color:#e8eaf0}
body.dark input,body.dark select,body.dark .dp-input,body.dark .fb-time{background:#252840!important;color:#e8eaf0!important;border-color:#2d3250!important}
</style>
</head>
<body>

<script>
// ═══════════════════════════════════════════════
// BRIDGE (POST ONLY)
// ═══════════════════════════════════════════════
var google = {
  script: {
    run: {
      _s: null, _f: null,
      withSuccessHandler: function(cb) { this._s = cb; return this; },
      withFailureHandler: function(cb) { this._f = cb; return this; },
      execute: function(fn, args) {
        var s = this._s, f = this._f;
        fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          mode: 'cors',
          body: JSON.stringify({ fn: fn, args: args })
        })
        .then(r => r.json())
        .then(data => { if (s) s(data); })
        .catch(e => { console.error(e); if (f) f(e); });
      },
      login: function(id, pwd) { this.execute('login', [id, pwd]); },
      getStats: function(t, f, to) { this.execute('getStats', [t, f, to]); },
      getAttendance: function(t, d, s) { this.execute('getAttendance', [t, d, s]); },
      getQtcUsers: function(t) { this.execute('getQtcUsers', [t]); },
      getUsers: function(t) { this.execute('getUsers', [t]); },
      logout: function(t) { this.execute('logout', [t]); }
    }
  }
};

// ══ GLOBALS ══
var SESSION = null, TOKEN = null, cachedStats = null;
var F={labeler:'labeler_name',shift:'shift',unit:'unit',modality:'modality',pass:'pass',date:'created_at',qc:'qtc_name'};

// ══ UTILS ══
function gid(id){return document.getElementById(id);}
function shtml(id,h){var el=gid(id);if(el)el.innerHTML=h;}
function show(id){gid(id).style.display='block';}
function hide(id){gid(id).style.display='none';}
function hasRole(r,l){return l.indexOf(r)!==-1;}
function titleCase(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'-';}

// ══ AUTH ══
function doLogin() {
    const id = gid('lEmail').value; 
    const pwd = gid('lPass').value; 
    const btn = gid('loginBtn');
    const errEl = gid('loginErr');

    if (!id || !pwd) {
        errEl.textContent = 'Please enter name and password';
        errEl.style.display = 'block';
        return;
    }

    btn.textContent = '...';
    btn.disabled = true;
    errEl.style.display = 'none';

    google.script.run
        .withSuccessHandler(function(res) {
            btn.textContent = 'Sign In';
            btn.disabled = false;
            if (res && res.ok) {
                SESSION = res.user;
                TOKEN = res.token;
                sessionStorage.setItem('dk_tok', TOKEN);
                sessionStorage.setItem('dk_usr', JSON.stringify(SESSION));
                hide('loginScreen');
                show('dashScreen');
                showDash(); 
                loadStats();
            } else {
                errEl.textContent = res.msg || 'Invalid credentials';
                errEl.style.display = 'block';
            }
        })
        .withFailureHandler(function() {
            btn.textContent = 'Sign In';
            btn.disabled = false;
            errEl.textContent = 'Connection failed';
            errEl.style.display = 'block';
        })
        .login(id, pwd);
}

function doLogout() {
  sessionStorage.clear();
  SESSION = null; TOKEN = null;
  hide('dashScreen');
  show('loginScreen');
  gid('lPass').value = '';
}

function showDash() {
  gid('sbName').textContent = titleCase(SESSION.name);
  gid('sbEmail').textContent = SESSION.email;
  gid('sbRole').textContent = SESSION.role.toUpperCase();
  if(SESSION.role === 'admin') document.querySelectorAll('.admin-only').forEach(el=>el.style.display='');
}

// ══ DATA LOADERS ══
function loadStats() {
  if(!TOKEN) return;
  shtml('statsArea','<div class="loading"><div class="spin"></div> Loading stats...</div>');
  google.script.run
    .withSuccessHandler(function(r) {
      if(r.err) { shtml('statsArea','<div class="empty">Error: '+r.err+'</div>'); return; }
      renderStats(r.data);
    })
    .getStats(TOKEN, gid('fFrom').value, gid('fTo').value);
}

function renderStats(data) {
  let lf=0, lq=0, lif=0, liq=0;
  data.forEach(r => {
    let m=(r[F.modality]||'').toLowerCase(), p=(r[F.pass]||'').toUpperCase();
    if(m.includes('lane')){ if(p==='FP')lf++; else lq++; }
    if(m.includes('lidar')){ if(p==='FP')lif++; else liq++; }
  });
  let h = '<div class="cards">';
  h += mkCard('Lane FP', lf, 'green','','','lane_fp');
  h += mkCard('Lane QA', lq, 'orange','','','lane_qa');
  h += mkCard('Lidar FP', lif, 'teal','','','lidar_fp');
  h += mkCard('Lidar QA', liq, 'purple','','','lidar_qa');
  h += '</div>';
  shtml('statsArea', h);
}

function buildTimeSelects() {
  var html = '';
  for (var h = 0; h < 24; h++) {
    for (var m = 0; m < 60; m += 30) {
      var hh = ('0' + h).slice(-2), mm = m === 0 ? '00' : '30';
      var val = hh + ':' + mm;
      var h12 = (h === 0 ? 12 : (h > 12 ? h - 12 : h));
      var ampm = h >= 12 ? 'PM' : 'AM';
      html += '<option value="' + val + '">' + h12 + ':' + mm + ' ' + ampm + '</option>';
    }
  }
  html += '<option value="23:59">End of Day</option>';
  ['fFromTime', 'fToTime'].forEach(id => {
    if(gid(id)) gid(id).innerHTML = html;
  });
}

// ══ INIT ══
window.onload = function() {
  buildTimeSelects();
  // Clock
  setInterval(() => {
    let d = new Date();
    gid('topClock').textContent = d.toLocaleTimeString();
  }, 1000);
  
  // Navigation
  document.querySelectorAll('.nav-item').forEach(el => {
    el.onclick = () => {
      let pg = el.dataset.page;
      document.querySelectorAll('.content > div').forEach(div => div.style.display='none');
      show('pg' + pg.charAt(0).toUpperCase() + pg.slice(1));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      el.classList.add('active');
      gid('topTitle').textContent = titleCase(pg);
    };
  });
};

function toggleDark(){ document.body.classList.toggle('dark'); }
</script>
